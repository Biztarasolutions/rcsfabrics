services:
  - type: web
    name: rcsfabrics-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx tsc-alias
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        value: rcs_fabrics_secret_key_2024 # You can change this in Render Dashboard for better security
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://rcsfabrics.netlify.app # Update this if your Netlify URL is different
